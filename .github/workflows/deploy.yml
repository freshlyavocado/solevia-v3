name: Deploy Solevia to Proxmox

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ghcr.io/freshlyavocado/solevia-frontend:latest

      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ghcr.io/freshlyavocado/solevia-backend:latest

      - name: Build and Push Webserver
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.nginx
          push: true
          tags: ghcr.io/freshlyavocado/solevia-webserver:latest

  deploy:
    needs: build-and-push
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to GHCR locally
        run: echo "${{ secrets.CR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Deploy with Docker Compose
        run: |
          docker compose pull
          docker compose up -d

      - name: Wait for MySQL to be ready
        run: |
          echo "Waiting for MySQL..."
          for i in $(seq 1 30); do
            if docker exec solevia-db mysqladmin ping -h localhost -u root -p12345 --silent 2>/dev/null; then
              echo "MySQL is ready!"
              break
            fi
            echo "Attempt $i/30 - MySQL not ready yet, waiting 5s..."
            sleep 5
          done

      - name: Generate APP_KEY and Run Migrations
        run: |
          docker exec solevia-backend php artisan key:generate --force
          docker exec solevia-backend php artisan migrate --force
